{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <meta charset="UTF-8" />
    <title>PodVault</title>
  </head>
  <body>
    <nav class="navbar">
      <a class="logo" href="{% url 'home' %}">🎙 PodVault</a>

      <div class="nav-links">
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'podcast_list' %}">Browse</a>

        {% if user.is_authenticated %}
          <a href="{% url 'playlist_list' %}">Playlists</a>
          <a href="{% url 'podcast_create' %}">Add Podcast</a>

          <form action="{% url 'logout' %}" method="post">
            {% csrf_token %}
            <button type="submit">Logout</button>
          </form>
        {% else %}
          <a href="{% url 'signup' %}">Sign Up</a>
        {% endif %}
      </div>
    </nav>
    <main>
      {% block content %}{% endblock %}
    </main>

    <script>
    function handlePlaylistChange(select) {
        if (select.value === "create") {
            window.location.href = "{% url 'playlist_create' %}";
        } else if (select.value) {
            select.form.submit();
        }
    }
    </script>

  </body>
</html>
