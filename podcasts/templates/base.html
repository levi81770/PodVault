{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    <meta charset="UTF-8" />
    <title>PodVault</title>
  </head>
  <body>
    <nav>
      <a href="{% url 'home' %}">Home</a>
      <a href="{% url 'podcast_list' %}">Podcasts</a>

      {% if user.is_authenticated %}
        <a href="{% url 'playlist_list' %}">My Playlists</a>
        <a href="{% url 'playlist_create' %}">Create Playlist</a>
        <a href="{% url 'podcast_create' %}">Add Podcast</a>
        <form action="{% url 'logout' %}" method="post">
          {% csrf_token %}
          <button type="submit">Logout</button>
        </form>
      {% else %}
        <a href="{% url 'home' %}">Login</a>
        <a href="{% url 'signup' %}">Sign Up</a>
      {% endif %}

    </nav>

    <main>
      {% block content %}{% endblock %}
    </main>

    <script>
    function handlePlaylistChange(select) {
        if (select.value === "create") {
            window.location.href = "{% url 'playlist_create' %}";
        } else if (select.value) {
            select.form.submit();
        }
    }
    </script>

  </body>
</html>
