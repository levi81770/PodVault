{% extends 'base.html' %}

{% block content %}
  <section class="form-card">

    <h1>Sign Up</h1>

    {% if error_message %}
      <p>{{ error_message }}</p>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit">Sign Up</button>
    </form>

  </section>
{% endblock %}
