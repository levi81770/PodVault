{% extends 'base.html' %}

{% block content %}

<section>
    <h1>Welcome to PodVault</h1>
    <p>Discover, review, and organize your favorite podcasts.</p>
</section>

{% if not user.is_authenticated %}
<section>
    <form action="{% url 'home' %}" method="post">
        <h2>Login</h2>

        {% csrf_token %}
        {{ form.as_p }}

        <input type="hidden" name="next" value="{{ next }}">

        <button type="submit">Login</button>
    </form>
</section>
{% else %}
<section>
    <h2>Welcome back, {{ user.username }}</h2>
</section>
{% endif %}

{% endblock %}
