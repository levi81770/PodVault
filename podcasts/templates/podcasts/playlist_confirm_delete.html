{% extends 'base.html' %}

{% block content %}

  <h1>Delete Playlist</h1>

  <p>Are you sure you want to delete "{{ object.name }}"?</p>

  <form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
  </form>

  <a href="{% url 'playlist_detail' object.pk %}">Cancel</a>

{% endblock %}
