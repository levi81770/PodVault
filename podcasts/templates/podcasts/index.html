{% extends 'base.html' %}

{% block content %}

<h1>All Podcasts</h1>

{% for podcast in podcasts %}
    <div>
        <h2>
            <a href="{% url 'podcast_detail' podcast.pk %}">
                {{ podcast.title }}
            </a>
        </h2>

        <p>Hosted by {{ podcast.host }}</p>
        <p>{{ podcast.description }}</p>
    </div>
{% empty %}
    <p>No podcasts have been added yet.</p>
{% endfor %}

{% endblock %}
