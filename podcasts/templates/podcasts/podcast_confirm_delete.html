{% extends 'base.html' %}

{% block content %}

  <section class="form-card delete-card">

    <h1>Delete Podcast</h1>

    <p>Are you sure you want to delete "{{ object.title }}"?</p>

    <form method="POST">
      {% csrf_token %}
      <button type="submit">Yes, Delete</button>
    </form>

    <a href="{% url 'podcast_detail' object.pk %}">Cancel</a>

  </section>

{% endblock %}
